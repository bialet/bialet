name: Release

# Build and publish platform binaries when a version tag is pushed.
# Tag format: v0.10.0

on:
  push:
    tags: ['v*']

jobs:
  # ── Linux x86_64 ────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev libssl-dev \
            libnghttp2-dev libidn2-dev librtmp-dev libssh2-1-dev libpsl-dev \
            libkrb5-dev libldap2-dev libbrotli-dev libzstd-dev

      - name: Build (static)
        run: make clean && make static

      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/bialet-${{ github.ref_name }}-linux-x86_64.tar.gz -C build bialet

      - uses: actions/upload-artifact@v4
        with:
          name: bialet-linux-x86_64
          path: dist/

  # ── Linux arm64 ──────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:22.04
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libsqlite3-dev libcurl4-openssl-dev libssl-dev git \
            libnghttp2-dev libidn2-dev librtmp-dev libssh2-1-dev libpsl-dev \
            libkrb5-dev libldap2-dev libbrotli-dev libzstd-dev
      - uses: actions/checkout@v4
      - name: Build (static)
        run: make clean && make static
      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/bialet-${{ github.ref_name }}-linux-arm64.tar.gz -C build bialet
      - uses: actions/upload-artifact@v4
        with:
          name: bialet-linux-arm64
          path: dist/

  # ── macOS arm64 (Apple Silicon) ─────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install openssl

      - name: Build
        run: make clean && make

      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/bialet-${{ github.ref_name }}-macos-arm64.tar.gz -C build bialet

      - uses: actions/upload-artifact@v4
        with:
          name: bialet-macos-arm64
          path: dist/

  # ── Windows x86_64 (cross-compiled, static) ─────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: ubuntu-22.04
    env:
      SQLITE_YEAR: 2024
      SQLITE_VERSION: 3460100
      OPENSSL_VERSION: 3.0.15
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64-posix

      - name: Build SQLite (static, for Windows)
        run: |
          curl -fsSLO "https://www.sqlite.org/${{ env.SQLITE_YEAR }}/sqlite-amalgamation-${{ env.SQLITE_VERSION }}.zip"
          unzip -q "sqlite-amalgamation-${{ env.SQLITE_VERSION }}.zip"
          cd "sqlite-amalgamation-${{ env.SQLITE_VERSION }}"
          x86_64-w64-mingw32-gcc -c sqlite3.c -O2 -o sqlite3.o
          x86_64-w64-mingw32-ar rcs libsqlite3.a sqlite3.o
          sudo install -Dm644 libsqlite3.a /usr/x86_64-w64-mingw32/lib/libsqlite3.a
          sudo install -Dm644 sqlite3.h sqlite3ext.h -t /usr/x86_64-w64-mingw32/include/

      - name: Build OpenSSL (static, for Windows)
        run: |
          curl -fsSLO "https://www.openssl.org/source/openssl-${{ env.OPENSSL_VERSION }}.tar.gz"
          tar xf "openssl-${{ env.OPENSSL_VERSION }}.tar.gz"
          cd "openssl-${{ env.OPENSSL_VERSION }}"
          ./Configure mingw64 --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix=/usr/x86_64-w64-mingw32 --libdir=lib \
            no-shared no-tests
          make -j$(nproc)
          sudo make install_sw

      - name: Build bialet (static)
        run: make clean && CC=x86_64-w64-mingw32-gcc make static

      - name: Package
        run: |
          mkdir -p dist
          zip -j dist/bialet-${{ github.ref_name }}-windows-x86_64.zip build/bialet.exe

      - uses: actions/upload-artifact@v4
        with:
          name: bialet-windows-x86_64
          path: dist/

  # ── GitHub Release ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-linux
      - build-linux-arm64
      - build-macos-arm64
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bialet-*
          merge-multiple: true
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
