name: Release

# Build and publish platform binaries when a version tag is pushed.
# Tag format: v0.10.0

on:
  push:
    tags: ['v*']

jobs:
  # ── Linux x86_64 ────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev libssl-dev

      - name: Build
        run: make clean && make

      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/bialet-${{ github.ref_name }}-linux-x86_64.tar.gz -C build bialet

      - uses: actions/upload-artifact@v4
        with:
          name: bialet-linux-x86_64
          path: dist/

  # ── Linux arm64 ──────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev libssl-dev

      - name: Build
        run: make clean && make

      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/bialet-${{ github.ref_name }}-linux-arm64.tar.gz -C build bialet

      - uses: actions/upload-artifact@v4
        with:
          name: bialet-linux-arm64
          path: dist/

  # ── macOS arm64 (Apple Silicon) ─────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install openssl

      - name: Build
        run: make clean && make

      - name: Package
        run: |
          mkdir -p dist
          tar czf dist/bialet-${{ github.ref_name }}-macos-arm64.tar.gz -C build bialet

      - uses: actions/upload-artifact@v4
        with:
          name: bialet-macos-arm64
          path: dist/

  # ── GitHub Release ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-linux
      - build-linux-arm64
      - build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bialet-*
          merge-multiple: true
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/*.tar.gz
          generate_release_notes: true
